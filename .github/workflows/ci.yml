name: CI

on: [push, pull_request]

jobs:
  quality:
    name: Test, typecheck, lint, build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm run test

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      # Uses committed packages/api-client/openapi/api-docs.json (generate:api does not call sync:openapi).
      - name: Check generated API clients
        run: pnpm --filter @event-platform/api-client generate:api:check
